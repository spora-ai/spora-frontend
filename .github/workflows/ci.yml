name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist.url matches the release tag
        run: |
          TAG_V="${GITHUB_REF_NAME}"
          EXPECTED="https://github.com/${{ github.repository }}/releases/download/${TAG_V}/spora-frontend-${TAG_V}.tar.gz"
          ACTUAL=$(jq -r .dist.url composer.json)
          echo "Tag:        ${TAG_V}"
          echo "Expected:   ${EXPECTED}"
          echo "Actual:     ${ACTUAL}"
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "::error::composer.json dist.url does not match the release tag. Update composer.json BEFORE tagging."
            echo "::error::Expected: ${EXPECTED}"
            echo "::error::Actual:   ${ACTUAL}"
            exit 1
          fi

      - name: Verify only dist/ is shipped
        run: |
          # The release artifact must contain ONLY the contents of dist/
          # (index.html, assets/, favicon.svg, ...). Nothing else — no
          # source code, no node_modules, no build configs.
          set -e
          STAGING=$(mktemp -d)
          cp -R dist/. "$STAGING"/
          tar -czf /tmp/release-check.tar.gz -C "$STAGING" .
          tar -tzf /tmp/release-check.tar.gz | head -20
          echo
          echo "Release artifact contains $(tar -tzf /tmp/release-check.tar.gz | wc -l | tr -d ' ') files."

      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Ship ONLY the Vite dist/ output. The archive's top-level
          # contents match the dist/ directory exactly (index.html,
          # assets/, favicon.svg, ...).
          rm -rf staging
          mkdir -p staging
          cp -R dist/. staging/
          tar -czf spora-frontend-${TAG}.tar.gz -C staging .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: spora-frontend-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
