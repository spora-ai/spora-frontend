name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload spora
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: spora
          path: spora/

  sonarqube:
    # SonarQube Cloud analysis — runs after lint-and-test so coverage is
    # already generated. Uses the official SonarSource action which:
    #   - reads SONAR_TOKEN from repo secrets automatically
    #   - automatically branches the analysis for PRs (PR key + decoration)
    #   - auto-detects SonarCloud vs SonarQube Server from the token
    name: SonarQube scan
    runs-on: ubuntu-latest
    # Run only on PRs and on direct pushes to main. Skip tag pushes:
    #   - SonarCloud uses the branch name to compute the new-code baseline.
    #     On a tag push GITHUB_REF_NAME = 'v0.1.9', which SonarCloud
    #     doesn't know about, so the scanner aborts with exit code 3
    #     ("quality gate failed" — there's no previous version to diff
    #     against on a ref it has never seen).
    #   - Tags carry the same code as main, so scanning them is redundant.
    #   - There's no PR to decorate on a tag push, so the PR-decoration
    #     feature of sonarsource/sonarqube-scan-action has nothing to do.
    # The release tag itself is published by the separate `build-and-release`
    # job below, which has its own gate on `startsWith(github.ref, 'refs/tags/v')`.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: lint-and-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # sonar-scan needs full history for blame / new-code

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      # Vitest v8 emits coverage/lcov.info at the project root. The action
      # reads sonar-project.properties, which references this exact path.
      # Skipping this step is the #1 cause of "Coverage is not yet visible"
      # in SonarCloud.
      - name: Run tests with coverage
        run: npm run test:coverage

      # Verify the report exists and is non-empty BEFORE invoking the
      # scanner. If `coverage/lcov.info` is missing the scanner reports a
      # successful analysis with 0% coverage and the dashboard shows
      # "Coverage is not yet visible" — failing here makes the cause
      # obvious in the workflow run.
      - name: Verify coverage report
        run: |
          set -euo pipefail
          if [ ! -s coverage/lcov.info ]; then
            echo "::error::coverage/lcov.info is missing or empty — the scanner would publish 0% coverage."
            echo "::error::Check that 'npm run test:coverage' succeeded and emitted ./coverage/lcov.info."
            exit 1
          fi
          echo "coverage/lcov.info size: $(wc -c < coverage/lcov.info) bytes"
          echo "covered files: $(grep -c '^SF:' coverage/lcov.info)"

      # Upload the lcov report as a workflow artifact for debugging — the
      # action below uploads it to SonarCloud via the scanner's internal
      # protocol, but having it on the artifact list lets you confirm the
      # report exists when a coverage-empty PR comes in.
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      # SonarQube Cloud analysis itself. The action wraps sonar-scanner,
      # so we don't invoke npx sonar-scanner manually — that path has
      # caused "Coverage is not yet visible" warnings in the past because
      # PR-key branching and decoration are not set up by hand.
      #
      # REQUIRED REPO SECRETS:
      #   - SONAR_TOKEN: a SonarCloud authentication token. Create one at
      #     https://sonarcloud.io/account/security and add it as a repo
      #     secret. Until this is set, the action exits 0 silently —
      #     coverage will not appear and the PR is green until then.
      #   - GITHUB_TOKEN: provided automatically by GitHub Actions;
      #     forwarded so the action can mark PR check runs.
      #
      # REQUIRED SONARCLOUD PROJECT:
      #   - A project with key `spora-ai_spora-frontend` must exist on
      #     SonarCloud under the `spora-ai` organization. Either bind it
      #     through the SonarCloud UI (Import from GitHub) or pass
      #     `-Dsonar.newCodeReferenceBranch=main` to enable the new-code
      #     baseline on the first scan.
      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Pinned to the v8.2.0 commit SHA (not the floating tag) — the
        # GitHub Actions security linter rejects tag references because
        # a tag can be re-pointed at a different commit. This is the
        # recommended successor to sonarsource/sonarcloud-github-action,
        # which is now deprecated upstream. See
        # https://github.com/SonarSource/sonarqube-scan-action/releases/tag/v8.2.0
        uses: sonarsource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        with:
          # The action reads sonar-project.properties for everything except
          # the token, which must come from a secret. Explicit args here
          # override properties if needed; we keep them minimal so the
          # properties file is the single source of truth.
          args: >
            -Dsonar.organization=spora-ai
            -Dsonar.projectKey=spora-ai_spora-frontend
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist.url matches the release tag
        run: |
          TAG_V="${GITHUB_REF_NAME}"
          EXPECTED="https://github.com/${{ github.repository }}/releases/download/${TAG_V}/spora-frontend-${TAG_V}.tar.gz"
          ACTUAL=$(jq -r .dist.url composer.json)
          echo "Tag:        ${TAG_V}"
          echo "Expected:   ${EXPECTED}"
          echo "Actual:     ${ACTUAL}"
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "::error::composer.json dist.url does not match the release tag. Update composer.json BEFORE tagging."
            echo "::error::Expected: ${EXPECTED}"
            echo "::error::Actual:   ${ACTUAL}"
            exit 1
          fi

      - name: Verify only spora/ is shipped
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # The release artifact must contain ONLY the contents of spora/
          # (Vite's build output: index.html, assets/, ...) under a single
          # spora-frontend-v<VERSION>/ root directory. Nothing else —
          # no source code, no node_modules, no build configs. The
          # versioned root is what Composer's TarDownloader (PHP's
          # PharData) requires to extract the archive cleanly.
          #
          # favicon.svg ships under assets/ (per d04e3c5: source at
          # public/assets/favicon.svg, Vite emits spora/assets/favicon.svg
          # with base: '/spora/') — not at the versioned root. Do not
          # require it at the root.
          set -e
          STAGING=$(mktemp -d)
          mkdir -p "$STAGING/spora-frontend-${TAG}"
          cp -R spora/. "$STAGING/spora-frontend-${TAG}/"
          tar -czf /tmp/release-check.tar.gz -C "$STAGING" "spora-frontend-${TAG}"
          PREFIX="spora-frontend-${TAG}/"
          tar -tzf /tmp/release-check.tar.gz | head -20
          echo
          echo "Release artifact contains $(tar -tzf /tmp/release-check.tar.gz | wc -l | tr -d ' ') entries."

          # Deny list: fail loudly if any of these ever sneak into the
          # release tarball. Add to this list if a new non-runtime path
          # starts shipping by accident. Strip the versioned root before
          # matching so the regex sees only real spora/ entries.
          DENY_PATTERNS='(^|/)(\.git|\.github|node_modules|src|tests|public|package\.json|package-lock\.json|composer\.json|composer\.lock|vite\.config\.ts|tsconfig\.json|tailwind\.config\.ts|postcss\.config\.js|eslint\.config\.js|README\.md|RELEASING\.md)$'
          LEAKED=$(tar -tzf /tmp/release-check.tar.gz | grep -E "^${PREFIX}" | sed "s|^${PREFIX}||" | grep -E "$DENY_PATTERNS" || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::Release artifact contains non-runtime paths:"
            echo "$LEAKED"
            exit 1
          fi

          # Allow list: confirm the expected spora/ entries are present,
          # each under the versioned root.
          for REQUIRED in index.html assets/; do
            if ! tar -tzf /tmp/release-check.tar.gz | grep -qx "^${PREFIX}${REQUIRED}"; then
              echo "::error::Release artifact is missing required entry: ${PREFIX}${REQUIRED}"
              exit 1
            fi
          done

          echo "OK: release artifact shape is correct (only spora/ contents, under spora-frontend-${TAG}/)."

      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Ship ONLY the Vite spora/ output, packaged under a single
          # versioned root directory so Composer's TarDownloader (PHP's
          # PharData) can extract the archive cleanly. The archive's
          # top entry must be "spora-frontend-${TAG}/", not "./" — the
          # latter is what made v0.1.3 fail with
          # "Cannot extract '.', internal error".
          rm -rf staging
          mkdir -p "staging/spora-frontend-${TAG}"
          cp -R spora/. "staging/spora-frontend-${TAG}/"
          tar -czf "spora-frontend-${TAG}.tar.gz" -C staging "spora-frontend-${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: spora-frontend-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
