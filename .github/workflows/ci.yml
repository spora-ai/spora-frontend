name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Mirror favicon.svg to dist root
        run: |
          # The favicon source is public/assets/favicon.svg, which Vite
          # emits as dist/assets/favicon.svg. The release archive shape
          # (allow-list in the next step, RELEASING.md) requires
          # favicon.svg at the versioned root too — for legacy callers,
          # existing documentation, and the installer. Copy it over.
          # No-op if the source isn't present (defensive — the build
          # still succeeds without a favicon at root in that case).
          if [ -f dist/assets/favicon.svg ]; then
            cp dist/assets/favicon.svg dist/favicon.svg
          fi

      - name: Verify dist.url matches the release tag
        run: |
          TAG_V="${GITHUB_REF_NAME}"
          EXPECTED="https://github.com/${{ github.repository }}/releases/download/${TAG_V}/spora-frontend-${TAG_V}.tar.gz"
          ACTUAL=$(jq -r .dist.url composer.json)
          echo "Tag:        ${TAG_V}"
          echo "Expected:   ${EXPECTED}"
          echo "Actual:     ${ACTUAL}"
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "::error::composer.json dist.url does not match the release tag. Update composer.json BEFORE tagging."
            echo "::error::Expected: ${EXPECTED}"
            echo "::error::Actual:   ${ACTUAL}"
            exit 1
          fi

      - name: Verify only dist/ is shipped
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # The release artifact must contain ONLY the contents of dist/
          # (index.html, assets/, favicon.svg, ...) under a single
          # spora-frontend-v<VERSION>/ root directory. Nothing else —
          # no source code, no node_modules, no build configs. The
          # versioned root is what Composer's TarDownloader (PHP's
          # PharData) requires to extract the archive cleanly.
          set -e
          STAGING=$(mktemp -d)
          mkdir -p "$STAGING/spora-frontend-${TAG}"
          cp -R dist/. "$STAGING/spora-frontend-${TAG}/"
          tar -czf /tmp/release-check.tar.gz -C "$STAGING" "spora-frontend-${TAG}"
          PREFIX="spora-frontend-${TAG}/"
          tar -tzf /tmp/release-check.tar.gz | head -20
          echo
          echo "Release artifact contains $(tar -tzf /tmp/release-check.tar.gz | wc -l | tr -d ' ') entries."

          # Deny list: fail loudly if any of these ever sneak into the
          # release tarball. Add to this list if a new non-runtime path
          # starts shipping by accident. Strip the versioned root before
          # matching so the regex sees only real dist/ entries.
          DENY_PATTERNS='(^|/)(\.git|\.github|node_modules|src|tests|public|package\.json|package-lock\.json|composer\.json|composer\.lock|vite\.config\.ts|tsconfig\.json|tailwind\.config\.ts|postcss\.config\.js|eslint\.config\.js|README\.md|RELEASING\.md)$'
          LEAKED=$(tar -tzf /tmp/release-check.tar.gz | grep -E "^${PREFIX}" | sed "s|^${PREFIX}||" | grep -E "$DENY_PATTERNS" || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::Release artifact contains non-runtime paths:"
            echo "$LEAKED"
            exit 1
          fi

          # Allow list: confirm the expected dist/ entries are present,
          # each under the versioned root.
          for REQUIRED in index.html favicon.svg assets/; do
            if ! tar -tzf /tmp/release-check.tar.gz | grep -qx "^${PREFIX}${REQUIRED}"; then
              echo "::error::Release artifact is missing required entry: ${PREFIX}${REQUIRED}"
              exit 1
            fi
          done

          echo "OK: release artifact shape is correct (only dist/ contents, under spora-frontend-${TAG}/)."

      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Ship ONLY the Vite dist/ output, packaged under a single
          # versioned root directory so Composer's TarDownloader (PHP's
          # PharData) can extract the archive cleanly. The archive's
          # top entry must be "spora-frontend-${TAG}/", not "./" — the
          # latter is what made v0.1.3 fail with
          # "Cannot extract '.', internal error".
          rm -rf staging
          mkdir -p "staging/spora-frontend-${TAG}"
          cp -R dist/. "staging/spora-frontend-${TAG}/"
          tar -czf "spora-frontend-${TAG}.tar.gz" -C staging "spora-frontend-${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: spora-frontend-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
