name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Update dist.url in composer.json to match tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          # 1.0.0 → v1.0.0 (some workflows strip the 'v', some don't — keep it)
          # If the tag is already prefixed with v, use as-is; otherwise prepend.
          case "$TAG" in
            v*) TAG_V="$TAG" ;;
            *)  TAG_V="v$TAG" ;;
          esac
          jq --arg url "https://github.com/${{ github.repository }}/releases/download/${TAG_V}/spora-frontend-${TAG_V}.tar.gz" \
             '.dist.url = $url' composer.json > composer.json.tmp \
            && mv composer.json.tmp composer.json
          cat composer.json | jq .dist.url

      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p staging/spora-frontend-${TAG}
          cp -R dist/. staging/spora-frontend-${TAG}/
          tar -czf spora-frontend-${TAG}.tar.gz -C staging spora-frontend-${TAG}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: spora-frontend-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
