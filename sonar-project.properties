# SonarQube / SonarCloud project configuration for spora-frontend.
#
# Coverage is produced by Vitest (v8 provider) and lands at ./coverage/lcov.info.
# The CI workflow runs `npm run test:coverage` and passes the report path to the
# scanner via -Dsonar.javascript.lcov.reportPaths so coverage shows up in
# SonarQube even when running locally.

sonar.projectKey=spora-ai_spora-frontend
sonar.projectName=spora-frontend
sonar.projectVersion=0.1.6

# Source / test layout
sonar.sources=src
sonar.tests=tests

# Exclusions — keep generated / vendor / build artefacts out of the analysis.
sonar.exclusions=\
  dist/**,\
  node_modules/**,\
  coverage/**,\
  **/*.d.ts,\
  public/**

sonar.test.exclusions=\
  dist/**,\
  node_modules/**,\
  coverage/**

# TypeScript / Vue / JS — use the bundled TS analyzer.
sonar.javascript.file.suffixes=.js,.ts,.vue
sonar.typescript.file.suffixes=.ts,.tsx
sonar.sourceEncoding=UTF-8

# Coverage reports — filled in by the CI workflow (or run locally with
# `-Dsonar.javascript.lcov.reportPaths=coverage/lcov.info`).
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.testExecutionReportPaths=coverage/test-report.xml

# Duplication detection — TS/JS only.
sonar.cpd.exclusions=\
  **/*.vue

# Security / quality gates — fail the pipeline on new issues and never
# let coverage drop below 70%.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300